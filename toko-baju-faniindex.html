<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Baju Online</title>
<style>
  body { font-family: Arial; margin: 20px; }
  .product { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; vertical-align: top; }
  .product img { width: 100%; height: 200px; object-fit: cover; }
  .btn { background-color: blue; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-top: 5px; }
</style>
</head>
<body>
<h1>Toko Baju Online</h1>
<div id="products"></div>

<script>
const products = [
  { name: "Kaos Putih", price: 100000, image: "https://i.ibb.co/4pDNDk1/kaos-putih.jpg" },
  { name: "Kemeja Hitam", price: 150000, image: "https://i.ibb.co/7Xc1b8s/kemeja-hitam.jpg" },
  { name: "Jaket Jeans", price: 250000, image: "https://i.ibb.co/1mY9VqZ/jaket-jeans.jpg" }
];

const container = document.getElementById("products");
products.forEach(p => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${p.image}" alt="${p.name}">
    <h3>${p.name}</h3>
    <p>Rp ${p.price.toLocaleString()}</p>
    <button class="btn" onclick="buy('${p.name}', ${p.price})">Beli</button>
  `;
  container.appendChild(div);
});

function buy(name, price) {
  alert(`Kamu membeli ${name} seharga Rp ${price.toLocaleString()}`);
}
</script>
</body>
</html>
